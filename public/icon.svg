<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#0f0f13"/>
  
  <!-- Grid cells -->
  <!-- Row 1 -->
  <rect x="40" y="40" width="130" height="130" rx="24" fill="#1a1a22" stroke="#2a2a35" stroke-width="4"/>
  <rect x="191" y="40" width="130" height="130" rx="24" fill="#1a1a22" stroke="#2a2a35" stroke-width="4"/>
  <rect x="342" y="40" width="130" height="130" rx="24" fill="#1a1a22" stroke="#2a2a35" stroke-width="4"/>
  <!-- Row 2 -->
  <rect x="40" y="191" width="130" height="130" rx="24" fill="#1a1a22" stroke="#2a2a35" stroke-width="4"/>
  <rect x="191" y="191" width="130" height="130" rx="24" fill="#1a1a22" stroke="#2a2a35" stroke-width="4"/>
  <rect x="342" y="191" width="130" height="130" rx="24" fill="#1a1a22" stroke="#2a2a35" stroke-width="4"/>
  <!-- Row 3 -->
  <rect x="40" y="342" width="130" height="130" rx="24" fill="#1a1a22" stroke="#2a2a35" stroke-width="4"/>
  <rect x="191" y="342" width="130" height="130" rx="24" fill="#1a1a22" stroke="#2a2a35" stroke-width="4"/>
  <rect x="342" y="342" width="130" height="130" rx="24" fill="#1a1a22" stroke="#2a2a35" stroke-width="4"/>

  <!-- X top-left -->
  <text x="105" y="128" text-anchor="middle" font-family="monospace" font-weight="900" font-size="96" fill="#ff6b6b">X</text>
  <!-- O top-middle -->
  <text x="256" y="128" text-anchor="middle" font-family="monospace" font-weight="900" font-size="96" fill="#74b9ff">O</text>
  <!-- O top-right (faded) -->
  <text x="407" y="128" text-anchor="middle" font-family="monospace" font-weight="900" font-size="96" fill="#74b9ff" opacity="0.3">O</text>
  <!-- X middle-left -->
  <text x="105" y="279" text-anchor="middle" font-family="monospace" font-weight="900" font-size="96" fill="#ff6b6b">X</text>
  <!-- X middle-right -->
  <text x="407" y="279" text-anchor="middle" font-family="monospace" font-weight="900" font-size="96" fill="#ff6b6b">X</text>
  <!-- O bottom-left -->
  <text x="105" y="430" text-anchor="middle" font-family="monospace" font-weight="900" font-size="96" fill="#74b9ff">O</text>
</svg>
